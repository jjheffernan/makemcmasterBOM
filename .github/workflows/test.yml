name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Unit tests (no live network)
        run: pytest -m 'not integration' -v

      - name: Regression CLI checks
        run: pytest tests/test_regression_checks.py tests/test_catalog_integrity.py -v

      - name: Guardrails — no tracked .env
        run: pytest tests/test_guardrails.py -v
